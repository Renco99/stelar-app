<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDELINE - Tournament Admin</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --danger: #ef4444; 
            --success: #39FF14; 
            --stellar-gold: #fbbf24; 
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding-bottom: 100px; 
            overflow-x: hidden;
        }

        /* CONSOLA DE ARBITRAJE */
        .control-panel { 
            background: #000; 
            padding: 15px; 
            border-bottom: 3px solid var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .score-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .game-clock { font-family: monospace; font-size: 2.8rem; font-weight: 800; color: white; line-height: 1; }
        .team-name { font-size: 0.6rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .score-val { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        
        /* BOTONES DE TIEMPO */
        .time-controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-t { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; 
            font-size: 0.7rem; font-weight: bold; cursor: pointer; 
            color: white; text-transform: uppercase; background: #334155; 
        }

        /* TARJETAS DE PARTIDOS Y JUGADORES */
        .match-card {
            background: var(--card);
            border-left: 5px solid var(--primary);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .player-row {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
