<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Match Center Pro</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; padding-bottom: 50px; user-select: none; }
        
        /* Panel de Control Superior (Mini) */
        .top-admin { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .btn-mini { padding: 4px 8px; font-size: 0.6rem; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white; cursor: pointer; opacity: 0.7; }
        .btn-mini:active { opacity: 1; background: var(--danger); }

        /* Marcador y Tiempos Muertos */
        .score-board { background: var(--card); padding: 12px; border-radius: 20px; text-align: center; border: 1px solid #334155; margin-bottom: 15px; }
        .game-clock { font-family: monospace; font-size: 2.2rem; font-weight: 800; color: var(--stellar-gold); margin-bottom: 5px; }
        .score-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 10px; }
        .score-num { font-size: 3.5rem; font-weight: 900; line-height: 1; }
        .to-indicator { font-size: 0.65rem; color: var(--primary); font-weight: 800; margin-top: 5px; }

        .timeout-controls { display: flex; gap: 8px; margin-top: 10px; }
        .btn-to { flex: 1; padding: 8px; font-size: 0.65rem; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; background: #334155; color: white; }
        .btn-to.active { background: var(--danger); animation: pulse 1s infinite; }

        /* Diseño de Dos Columnas */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .team-label { font-size: 0.7rem; font-weight: 900; text-align: center; color: var(--stellar-gold); padding: 8px; text-transform: uppercase; border-bottom: 1px solid #334155; }

        /* Jugadores Colapsables */
        .player-mini { background: var(--card); border-radius: 12px; margin-bottom: 8px; border: 1px solid #475569; overflow: hidden; }
        .player-head { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .player-name { font-size: 0.85rem; font-weight: 700; }
        
        .player-edit { display: none; padding: 15px 10px; background: #111827; border-top: 1px solid #334155; }
        .player-edit.open { display: block; animation: slideDown 0.2s ease; }
        
        /* Controles de Estadística con Etiquetas */
        .stat-group { text-align: center; flex: 1; }
        .stat-tag { font-size: 0.55rem; color: var(--primary); font-weight: 900; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .stat-actions { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-p { width: 34px; height: 34px; border-radius: 8px; border: none; font-weight: bold; font-size: 1.2rem; color: white; background: var(--success); }
        .btn-m { width: 34px; height: 28px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; color: white; background: var(--danger); opacity: 0.8; }
        .v-display { font-size: 1.2rem; font-weight: 900; padding: 2px 0; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-admin">
        <button id="ctrl-match" class="btn-mini" onclick="toggleMatch()">Iniciar</button>
        <button class="btn-mini" onclick="resetConfirm()">Reset</button>
    </div>

    <div class="score-board">
        <div id="master-clock" class="game-clock">00:00</div>
        <div class="score-row">
            <div>
                <div id="scoreA" class="score-num">0</div>
                <div id="toA" class="to-indicator">TO: 0/2</div>
            </div>
            <div style="opacity:0.2; font-weight:bold;">VS</div>
            <div>
                <div id="scoreB" class="score-num">0</div>
                <div id="toB" class="to-indicator">TO: 0/2</div>
            </div>
        </div>

        <div class="timeout-controls">
            <button id="to-btn-a" class="btn-to" onclick="useTimeout('A')">TO LOCAL (70s)</button>
            <button id="to-btn-half" class="btn-to" style="flex:0.5" onclick="startHalf()">MITAD</button>
            <button id="to-btn-b" class="btn-to" onclick="useTimeout('B')">TO VISITA (70s)</button>
        </div>
    </div>

    <div class="match-grid">
        <div class="team-column">
            <div id="nameA" class="team-label">LOCAL</div>
            <div id="listA"></div>
        </div>
        <div class="team-column">
            <div id="nameB" class="team-label">VISITA</div>
            <div id="listB"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const PARTIDO_ID = 1;
        
        let matchRunning = false;
        let clockInterval = null;

        async function fetchAll() {
            try {
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const p = (await resP.json())[0];
                
                document.getElementById('nameA').innerText = p.equipo_a;
                document.getElementById('nameB').innerText = p.equipo_b;
                document.getElementById('scoreA').innerText = p.puntos_a;
                document.getElementById('scoreB').innerText = p.puntos_b;
                document.getElementById('toA').innerText = `TO: ${p.timeouts_a}/2`;
                document.getElementById('toB').innerText = `TO: ${p.timeouts_b}/2`;

                if(p.estado === 'en curso' && p.tiempo_inicio && !matchRunning) resumeClock(p.tiempo_inicio);

                const resJ = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*&order=numero.asc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const jugadores = await resJ.json();
                const contA = document.getElementById('listA');
                const contB = document.getElementById('listB');
                contA.innerHTML = ''; contB.innerHTML = '';

                jugadores.forEach(j => {
                    const card = `
                    <div class="player-mini">
                        <div class="player-head" onclick="toggleEdit(${j.id})">
                            <span class="player-name">#${j.numero} ${j.nombre.split(' ')[0]}</span>
                            <span style="font-size:0.6rem; opacity:0.4">${j.goles||0}/${j.asistencias||0}/${j.defensas||0}</span>
                        </div>
                        <div id="ed-${j.id}" class="player-edit">
                            <div style="display:flex; justify-content:space-between">
                                ${renderStat(j.id, 'goles', j.goles, 'GOL', j.equipo)}
                                ${renderStat(j.id, 'asistencias', j.asistencias, 'AST', j.equipo)}
                                ${renderStat(j.id, 'defensas', j.defensas, 'DEF', j.equipo)}
                            </div>
                        </div>
                    </div>`;
                    if(j.equipo.toLowerCase() === p.equipo_a.toLowerCase()) contA.innerHTML += card;
                    else if(j.equipo.toLowerCase() === p.equipo_b.toLowerCase()) contB.innerHTML += card;
                });
            } catch (e) { console.error(e); }
        }

        function renderStat(id, col, val, label, eq) {
            return `
            <div class="stat-group">
                <span class="stat-tag">${label}</span>
                <div class="stat-actions">
                    <button class="btn-p" onclick="updateStat(${id},'${col}',${(val||0)+1},'${eq}')">+</button>
                    <span class="v-display">${val||0}</span>
                    <button class="btn-m" onclick="updateStat(${id},'${col}',${(val||0)-1},'${eq}')">-</button>
                </div>
            </div>`;
        }

        function toggleEdit(id) {
            const el = document.getElementById(`ed-${id}`);
            const isOpen = el.classList.contains('open');
            document.querySelectorAll('.player-edit').forEach(e => e.classList.remove('open'));
            if(!isOpen) el.classList.add('open');
        }

        // CONTROL DE TIEMPOS MUERTOS
        async function useTimeout(side) {
            const field = side === 'A' ? 'timeouts_a' : 'timeouts_b';
            const btn = document.getElementById(`to-btn-${side.toLowerCase()}`);
            
            if(!confirm(`¿Confirmar Time Out para ${side === 'A' ? 'LOCAL' : 'VISITA'}?`)) return;

            const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const p = (await resP.json())[0];
            
            await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ [field]: (p[field] || 0) + 1 })
            });

            startTimer(70, btn, `TO ${side === 'A' ? 'LOCAL' : 'VISITA'}`);
            fetchAll();
        }

        function startTimer(sec, btn, originalText) {
            btn.classList.add('active');
            let t = sec;
            const int = setInterval(() => {
                btn.innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
                if(t-- <= 0) {
                    clearInterval(int);
                    btn.classList.remove('active');
                    btn.innerText = originalText;
                    alert("¡Tiempo fuera terminado!");
                }
            }, 1000);
        }

        // REPETIR LÓGICA DE RELOJ E INICIO (Confirmaciones añadidas)
        async function toggleMatch() {
            const action = matchRunning ? "FINALIZAR" : "INICIAR";
            if(!confirm(`¿Seguro que quieres ${action} el partido?`)) return;
            // ... (Lógica de toggleMatch anterior)
            matchRunning = !matchRunning;
            location.reload(); // Recarga simple para sincronizar estado
        }

        function resetConfirm() {
            if(confirm("⚠ ¡ADVERTENCIA! Se borrarán todos los puntos, estadísticas y tiempos muertos. ¿Continuar?")) {
                // Lógica de reset (puntos = 0, timeouts = 0, stats = 0)
                location.reload();
            }
        }

        fetchAll();
        setInterval(fetchAll, 10000);
    </script>
</body>
</html>
