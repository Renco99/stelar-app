<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Match Center</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; padding-bottom: 80px; }
        
        .app-header { text-align: center; margin-bottom: 10px; }
        .app-header h1 { font-size: 1.2rem; letter-spacing: 2px; color: var(--stellar-gold); margin: 0; font-weight: 900; }

        /* Marcador y Reloj Master */
        .score-board { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 2px solid #334155; margin-bottom: 15px; }
        .game-clock { font-family: monospace; font-size: 2.5rem; font-weight: 800; color: var(--stellar-gold); margin-bottom: 10px; }
        .score-display { display: flex; justify-content: space-around; align-items: center; font-size: 3.5rem; font-weight: 900; }
        
        .main-controls { display: flex; gap: 8px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-start { background: var(--success); color: white; }
        .btn-finish { background: var(--danger); color: white; }

        /* Diseño de Dos Columnas */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: start; }
        .team-column { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 5px; }
        .team-label { font-size: 0.65rem; font-weight: 900; text-align: center; color: var(--stellar-gold); margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #334155; }

        /* Tarjetas Compactas */
        .player-mini { background: var(--card); border-radius: 10px; margin-bottom: 6px; border: 1px solid #475569; }
        .player-head { padding: 10px; font-size: 0.8rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .player-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70px; }
        
        .player-edit { display: none; padding: 10px; background: #111827; border-top: 1px solid #334155; }
        .player-edit.open { display: block; }
        
        .stat-row { display: flex; justify-content: space-around; gap: 4px; }
        .btn-s { width: 30px; height: 30px; border-radius: 6px; border: none; font-weight: 800; color: white; font-size: 1rem; }
        .v-box { text-align: center; font-size: 0.6rem; }
        .v-num { display: block; font-size: 1.1rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="app-header"><h1>STELLAR</h1></div>

    <div class="score-board">
        <div id="master-clock" class="game-clock">00:00</div>
        <div class="score-display">
            <div id="scoreA">0</div>
            <div style="opacity:0.2; font-size: 1.5rem;">VS</div>
            <div id="scoreB">0</div>
        </div>
        <div class="main-controls">
            <button id="ctrl-match" class="btn-action btn-start" onclick="toggleMatch()">Iniciar Partido</button>
            <button class="btn-action" style="background:#475569" onclick="resetAll()">Reset</button>
        </div>
    </div>

    <div class="match-grid">
        <div class="team-column">
            <div id="nameA" class="team-label">LOCAL</div>
            <div id="listA"></div>
        </div>
        <div class="team-column">
            <div id="nameB" class="team-label">VISITA</div>
            <div id="listB"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const PARTIDO_ID = 1;
        
        let matchRunning = false;
        let startTime = null;
        let clockInterval = null;

        async function fetchAll() {
            try {
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const partido = await resP.json();
                const p = partido[0];
                
                document.getElementById('nameA').innerText = p.equipo_a;
                document.getElementById('nameB').innerText = p.equipo_b;
                document.getElementById('scoreA').innerText = p.puntos_a;
                document.getElementById('scoreB').innerText = p.puntos_b;

                // Lógica de reloj si el partido ya inició en Supabase
                if(p.estado === 'en curso' && p.tiempo_inicio && !matchRunning) {
                    resumeClock(p.tiempo_inicio);
                }

                const resJ = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const jugadores = await resJ.json();
                
                const contA = document.getElementById('listA');
                const contB = document.getElementById('listB');
                contA.innerHTML = ''; contB.innerHTML = '';

                jugadores.forEach(j => {
                    const html = `
                        <div class="player-mini">
                            <div class="player-head" onclick="document.getElementById('ed-${j.id}').classList.toggle('open')">
                                <span class="player-name">#${j.numero} ${j.nombre.split(' ')[0]}</span>
                                <span style="font-size:0.6rem; opacity:0.5">${j.goles||0}/${j.asistencias||0}</span>
                            </div>
                            <div id="ed-${j.id}" class="player-edit">
                                <div class="stat-row">
                                    ${renderS(j.id, 'goles', j.goles, 'G', j.equipo)}
                                    ${renderS(j.id, 'asistencias', j.asistencias, 'A', j.equipo)}
                                    ${renderS(j.id, 'defensas', j.defensas, 'D', j.equipo)}
                                </div>
                            </div>
                        </div>`;
                    
                    // Filtrado inteligente: Solo mostrar si pertenece a uno de los dos equipos
                    if(j.equipo.toLowerCase() === p.equipo_a.toLowerCase()) contA.innerHTML += html;
                    if(j.equipo.toLowerCase() === p.equipo_b.toLowerCase()) contB.innerHTML += html;
                });
            } catch (e) { console.error(e); }
        }

        function renderS(id, col, val, lab, eq) {
            return `<div class="v-box">
                <span class="v-num">${val||0}</span>
                <button class="btn-s" style="background:var(--success)" onclick="updateStat(${id},'${col}',${(val||0)+1},'${eq}')">+</button>
                <button class="btn-s" style="background:var(--danger); margin-top:5px;" onclick="updateStat(${id},'${col}',${(val||0)-1},'${eq}')">-</button>
            </div>`;
        }

        // CONTROL DEL PARTIDO
        async function toggleMatch() {
            const btn = document.getElementById('ctrl-match');
            if(!matchRunning) {
                const now = new Date().toISOString();
                await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado: 'en curso', tiempo_inicio: now })
                });
                resumeClock(now);
            } else {
                clearInterval(clockInterval);
                matchRunning = false;
                btn.innerText = "Reiniciar";
                btn.className = "btn-action btn-start";
            }
        }

        function resumeClock(isoTime) {
            matchRunning = true;
            startTime = new Date(isoTime);
            const btn = document.getElementById('ctrl-match');
            btn.innerText = "Finalizar";
            btn.className = "btn-action btn-finish";

            clockInterval = setInterval(() => {
                const diff = Math.floor((new Date() - startTime) / 1000);
                const m = Math.floor(diff / 60);
                const s = diff % 60;
                document.getElementById('master-clock').innerText = `${m}:${s<10?'0':''}${s}`;
            }, 1000);
        }

        async function updateStat(id, col, newVal, eqJ) {
            if(newVal < 0) return;
            // (Lógica de actualización de marcador similar a la anterior pero optimizada)
            await fetch(`${SUPABASE_URL}/rest/v1/jugadores?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ [col]: newVal })
            });
            if(col === 'goles') {
                const isA = eqJ.toLowerCase() === document.getElementById('nameA').innerText.toLowerCase();
                const field = isA ? 'puntos_a' : 'puntos_b';
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const p = await resP.json();
                await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: (p[0][field]||0) + (newVal > (p[0][field]||0) ? 1 : -1) })
                });
            }
            fetchAll();
        }

        fetchAll();
        setInterval(fetchAll, 15000);
    </script>
</body>
</html>
