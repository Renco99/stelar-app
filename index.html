<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELAR - High Performance</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* Marcador Pro */
        .score-board { background: var(--card); padding: 20px; border-radius: 24px; text-align: center; margin-bottom: 20px; border: 1px solid #334155; position: relative; }
        .teams-header { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; padding: 0 10px; }
        .score-display { display: flex; justify-content: space-around; align-items: center; font-size: 4.5rem; font-weight: 900; line-height: 1; }
        .vs { font-size: 1.2rem; opacity: 0.2; }
        
        .reset-btn { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid #475569; color: #475569; font-size: 0.6rem; padding: 4px 8px; border-radius: 6px; cursor: pointer; }

        /* Tarjetas */
        .player-card { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px; border-left: 6px solid var(--primary); }
        .player-head { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .player-name { font-weight: 700; }
        .player-team { font-size: 0.7rem; color: var(--warning); font-weight: 800; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: #0f172a; padding: 10px 4px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; margin-bottom: 6px; display: block; }
        
        .counter { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-stat { width: 32px; height: 32px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .plus { background: var(--success); }
        .minus { background: var(--danger); }
        .stat-val { font-size: 1.2rem; font-weight: 800; min-width: 20px; }

        .section-title { font-size: 0.8rem; color: var(--primary); font-weight: 800; text-transform: uppercase; margin: 25px 0 15px 5px; }
    </style>
</head>
<body>

    <div class="score-board">
        <button class="reset-btn" onclick="resetMarcador()">RESET</button>
        <div class="teams-header">
            <span id="nameA">LOCAL</span>
            <span>VS</span>
            <span id="nameB">VISITA</span>
        </div>
        <div class="score-display">
            <div id="scoreA">0</div>
            <div class="vs">:</div>
            <div id="scoreB">0</div>
        </div>
    </div>

    <div class="section-title">🏃 Planilla en Vivo</div>
    <div id="lista-jugadores">Cargando jugadores...</div>

    <script>
        const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const PARTIDO_ID = 1;

        // 1. CARGAR DATOS
        async function fetchAll() {
            try {
                // Traer Partido para saber quién es local y visita
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const partido = await resP.json();
                if(partido[0]) {
                    document.getElementById('nameA').innerText = partido[0].equipo_a;
                    document.getElementById('nameB').innerText = partido[0].equipo_b;
                    document.getElementById('scoreA').innerText = partido[0].puntos_a;
                    document.getElementById('scoreB').innerText = partido[0].puntos_b;
                }

                // Traer Jugadores
                const resJ = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*&order=numero.asc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const jugadores = await resJ.json();
                const contJ = document.getElementById('lista-jugadores');
                contJ.innerHTML = '';
                
                jugadores.forEach(j => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `
                        <div class="player-head">
                            <span class="player-name">#${j.numero} ${j.nombre}</span>
                            <span class="player-team">${j.equipo}</span>
                        </div>
                        <div class="stats-grid">
                            ${renderControl(j.id, 'goles', j.goles, 'GOL', j.equipo)}
                            ${renderControl(j.id, 'asistencias', j.asistencias, 'AST')}
                            ${renderControl(j.id, 'defensas', j.defensas, 'DEF')}
                        </div>`;
                    contJ.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        function renderControl(id, col, val, label, equipo = null) {
            return `
                <div class="stat-box">
                    <span class="stat-label">${label}</span>
                    <div class="counter">
                        <button class="btn-stat minus" onclick="updateStat(${id}, '${col}', ${val - 1}, '${equipo}')">-</button>
                        <span class="stat-val">${val || 0}</span>
                        <button class="btn-stat plus" onclick="updateStat(${id}, '${col}', ${val + 1}, '${equipo}')">+</button>
                    </div>
                </div>`;
        }

        // 2. ACTUALIZAR STATS Y MARCADOR SIMULTÁNEO
        async function updateStat(id, col, newVal, equipoJugador) {
            if (newVal < 0) return;

            // Diferencia para saber si sumamos o restamos al marcador
            const resOld = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?id=eq.${id}&select=${col}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const oldData = await resOld.json();
            const oldVal = oldData[0][col] || 0;
            const diff = newVal - oldVal;

            // Actualizar Jugador
            await fetch(`${SUPABASE_URL}/rest/v1/jugadores?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ [col]: newVal })
            });

            // Si es GOL, actualizar marcador del equipo correspondiente
            if (col === 'goles') {
                const teamA = document.getElementById('nameA').innerText;
                const field = (equipoJugador === teamA) ? 'puntos_a' : 'puntos_b';
                
                const resP = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const pData = await resP.json();
                const newScore = (pData[0][field] || 0) + diff;

                await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: newScore })
                });
            }
            fetchAll();
        }

        // 3. RESETEAR TODO
        async function resetMarcador() {
            if(!confirm("¿Seguro quieres reiniciar el marcador y las estadísticas?")) return;
            
            // Reset Partido
            await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ puntos_a: 0, puntos_b: 0 })
            });

            // Reset Jugadores (Opcional: puedes resetear solo el marcador si prefieres)
            // Para resetear estadísticas de todos:
            const resJ = await fetch(`${SUPABASE_URL}/rest/v1/jugadores`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ goles: 0, asistencias: 0, defensas: 0 })
            });

            fetchAll();
        }

        setInterval(fetchAll, 5000); // Sincroniza todo cada 5 segundos
        fetchAll();
    </script>
</body>
</html>
