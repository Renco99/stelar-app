<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Ultimate Console v4</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; user-select: none; }
        
        #modal-start { position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); width: 100%; max-width: 350px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: white; opacity: 0.5; font-size: 0.75rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { opacity: 1; color: var(--stellar-gold); font-weight: bold; }

        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        .score-board { background: var(--card); padding: 20px; border-radius: 24px; text-align: center; border: 1px solid #334155; margin-bottom: 15px; }
        .game-clock { font-family: monospace; font-size: 3.5rem; font-weight: 800; color: var(--stellar-gold); margin: 5px 0; }
        .clock-warning { color: var(--danger); animation: blink 1s infinite; }
        
        .btn-ctrl { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 0.7rem; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-full { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; margin-top: 15px; cursor: pointer; text-transform: uppercase; }

        .grid-players { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-card { background: var(--card); border-radius: 14px; border: 1px solid #475569; margin-bottom: 8px; overflow: hidden; }
        .player-head { padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .player-stats { display: none; padding: 10px; background: #111827; border-top: 1px solid #334155; justify-content: space-around; }
        .player-stats.open { display: flex; }
        
        .stat-group { text-align: center; display: flex; flex-direction: column; gap: 4px; }
        .btn-p { width: 32px; height: 32px; border-radius: 6px; border: none; background: var(--success); color: white; font-weight: bold; }
        .btn-m { width: 32px; height: 26px; border-radius: 6px; border: none; background: var(--danger); color: white; opacity: 0.6; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="modal-start">
        <div class="modal-content">
            <h3 style="color:var(--stellar-gold); margin-top:0; text-align:center">REGLAS DEL PARTIDO</h3>
            <label style="font-size:0.7rem">DURACIÓN TOTAL (MIN):</label>
            <input type="number" id="cfg-mins" value="90">
            <label style="font-size:0.7rem">ALARMA ÚLTIMOS MINUTOS:</label>
            <input type="number" id="cfg-alarm" value="5">
            <label style="font-size:0.7rem">TIMEOUTS POR EQUIPO:</label>
            <input type="number" id="cfg-to" value="2">
            <div style="display:flex; gap:10px; margin-top:15px">
                <button onclick="closeModal()" class="btn-ctrl" style="flex:1; background:#475569">CANCELAR</button>
                <button onclick="confirmStart()" class="btn-ctrl" style="flex:1; background:var(--success)">COMENZAR</button>
            </div>
        </div>
    </div>

    <div id="view-tournament" class="view active">
        <h2 style="color:var(--stellar-gold)">HUB DE TORNEO</h2>
        <div id="match-list">Cargando partidos...</div>
    </div>

    <div id="view-sheet" class="view">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px">
            <button onclick="showView('tournament')" class="btn-ctrl" style="background:#475569">← HUB</button>
            <div style="display:flex; gap:5px">
                <button id="btn-master" onclick="handleTimerMaster()" class="btn-ctrl" style="background:var(--success)">INICIAR</button>
                <button onclick="confirmReset()" class="btn-ctrl" style="background:var(--danger)">RESET</button>
            </div>
        </div>

        <div class="score-board">
            <div id="game-cancha" style="font-size:0.6rem; color:var(--stellar-gold); letter-spacing:1px">SELECCIONA PARTIDO</div>
            <div id="game-timer" class="game-clock">00:00</div>
            <div style="display:flex; justify-content:space-around; font-size:3.5rem; font-weight:900;">
                <div><span id="scoreA">0</span><br><small id="to-a-count" style="font-size:0.6rem; color:var(--primary)">TO: 2</small></div>
                <span>:</span>
                <div><span id="scoreB">0</span><br><small id="to-b-count" style="font-size:0.6rem; color:var(--primary)">TO: 2</small></div>
            </div>
            <div style="display:flex; gap:5px; margin-top:15px">
                <button id="btn-to-a" class="btn-ctrl" style="flex:1; background:#334155" onclick="runTO('A')">TO LOCAL</button>
                <button id="btn-half" class="btn-ctrl" style="flex:0.8; background:#334155" onclick="runHalfTime()">MEDIO TIEMPO</button>
                <button id="btn-to-b" class="btn-ctrl" style="flex:1; background:#334155" onclick="runTO('B')">TO VISITA</button>
            </div>
            <button id="btn-cancel-timer" onclick="stopAllTimers()" style="display:none; width:100%; margin-top:10px; background:var(--danger); border:none; color:white; padding:8px; border-radius:8px; font-weight:bold; font-size:0.7rem">CANCELAR TIEMPO MUERTO</button>
        </div>

        <div class="grid-players">
            <div id="listA"></div>
            <div id="listB"></div>
        </div>

        <button onclick="finishMatch()" class="btn-full" style="background:var(--primary); color:white; margin-top:30px">FINALIZAR Y ARCHIVAR</button>
    </div>

    <div id="view-results" class="view">
        <h2 style="color:var(--stellar-gold)">HISTORIAL Y EDICIÓN</h2>
        <div id="history-list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showView('tournament')">🏆 Torneo</div>
        <div class="nav-item" id="nav-sheet" onclick="showView('sheet')">📋 Planilla</div>
        <div class="nav-item" onclick="showView('results')">📊 Resultados</div>
    </nav>

    <script>
        const S_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co/rest/v1';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const HEAD = { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let currentMatch = null;
        let clockInt = null;
        let extraTimerInt = null;
        let timeLeft = 5400;
        let alarmLimit = 300;
        let isRunning = false;
        let maxTimeouts = 2;

        function showView(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'tournament') loadMatches();
            if(v === 'results') loadHistory();
        }

        // --- RELOJ PRINCIPAL ---
        function handleTimerMaster() {
            if(!currentMatch) return alert("Selecciona un partido primero");
            if(timeLeft === 0 || !isRunning && timeLeft === 5400) {
                document.getElementById('modal-start').style.display = 'flex';
            } else {
                toggleClock();
            }
        }

        function closeModal() { document.getElementById('modal-start').style.display = 'none'; }

        function confirmStart() {
            timeLeft = document.getElementById('cfg-mins').value * 60;
            alarmLimit = document.getElementById('cfg-alarm').value * 60;
            maxTimeouts = document.getElementById('cfg-to').value;
            
            // UI Reset
            document.getElementById('to-a-count').innerText = `TO: ${maxTimeouts}`;
            document.getElementById('to-b-count').innerText = `TO: ${maxTimeouts}`;
            closeModal();
            toggleClock();
        }

        function toggleClock() {
            isRunning = !isRunning;
            const btn = document.getElementById('btn-master');
            if(isRunning) {
                btn.innerText = "PAUSAR"; btn.style.background = "var(--danger)";
                clockInt = setInterval(() => {
                    if(timeLeft > 0) {
                        timeLeft--;
                        updateUIClock();
                    } else {
                        clearInterval(clockInt);
                        alert("TIEMPO AGOTADO");
                    }
                }, 1000);
            } else {
                clearInterval(clockInt);
                btn.innerText = "REANUDAR"; btn.style.background = "var(--success)";
            }
        }

        function updateUIClock() {
            const m = Math.floor(timeLeft/60);
            const s = timeLeft%60;
            const el = document.getElementById('game-timer');
            el.innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= alarmLimit) el.classList.add('clock-warning');
            else el.classList.remove('clock-warning');
        }

        // --- TIMEOUTS Y MEDIO TIEMPO ---
        function runTO(side) {
            const field = side === 'A' ? 'timeouts_a' : 'timeouts_b';
            if((currentMatch[field] || 0) >= maxTimeouts) return alert("Sin Timeouts");
            startExtraTimer(70, side === 'A' ? 'btn-to-a' : 'btn-to-b', `TO ${side}`, field);
        }

        function runHalfTime() {
            startExtraTimer(300, 'btn-half', 'MEDIO TIEMPO');
        }

        function startExtraTimer(sec, btnId, originalText, dbField = null) {
            if(!confirm(`¿Iniciar ${originalText}?`)) return;
            document.getElementById('btn-cancel-timer').style.display = 'block';
            const btn = document.getElementById(btnId);
            let t = sec;
            btn.style.background = "var(--danger)";
            
            if(dbField) {
                currentMatch[dbField] = (currentMatch[dbField] || 0) + 1;
                document.getElementById(dbField === 'timeouts_a' ? 'to-a-count' : 'to-b-count').innerText = `TO: ${maxTimeouts - currentMatch[dbField]}`;
                fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ [dbField]: currentMatch[dbField] }) });
            }

            extraTimerInt = setInterval(() => {
                btn.innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
                if(t-- <= 0) stopAllTimers();
            }, 1000);
        }

        function stopAllTimers() {
            clearInterval(extraTimerInt);
            document.getElementById('btn-cancel-timer').style.display = 'none';
            document.getElementById('btn-to-a').innerText = "TO LOCAL";
            document.getElementById('btn-to-b').innerText = "TO VISITA";
            document.getElementById('btn-half').innerText = "MEDIO TIEMPO";
            document.querySelectorAll('.score-board .btn-ctrl').forEach(b => b.style.background = "#334155");
        }

        // --- GESTIÓN DE DATOS ---
        async function loadMatches() {
            const res = await fetch(`${S_URL}/partidos?estado=neq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            document.getElementById('match-list').innerHTML = data.map(m => `
                <div onclick="selectMatch(${m.id})" style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #334155">
                    <b>${m.equipo_a} vs ${m.equipo_b}</b><br><small>${m.cancha}</small>
                </div>
            `).join('') || "No hay partidos activos";
        }

        async function selectMatch(id) {
            const res = await fetch(`${S_URL}/partidos?id=eq.${id}`, { headers: HEAD });
            currentMatch = (await res.json())[0];
            document.getElementById('game-cancha').innerText = currentMatch.cancha.toUpperCase();
            showView('sheet');
            loadSheet();
        }

        async function loadSheet() {
            document.getElementById('scoreA').innerText = currentMatch.puntos_a;
            document.getElementById('scoreB').innerText = currentMatch.puntos_b;
            const resJ = await fetch(`${S_URL}/jugadores?select=*&order=numero.asc`, { headers: HEAD });
            const jugadores = await resJ.json();
            const lA = document.getElementById('listA'); const lB = document.getElementById('listB');
            lA.innerHTML = ''; lB.innerHTML = '';
            jugadores.forEach(j => {
                const card = `<div class="player-card">
                    <div class="player-head" onclick="toggleS(${j.id})"><span>#${j.numero} ${j.nombre.split(' ')[0]}</span><b>${j.goles||0}</b></div>
                    <div id="s-${j.id}" class="player-stats">
                        <div class="stat-group"><small>GOL</small><button class="btn-p" onclick="up(${j.id},'goles',${(j.goles||0)+1},'${j.equipo}')">+</button></div>
                        <div class="stat-group"><small>AST</small><button class="btn-p" onclick="up(${j.id},'asistencias',${(j.asistencias||0)+1},'${j.equipo}')">+</button></div>
                    </div>
                </div>`;
                if(j.equipo.toLowerCase() === currentMatch.equipo_a.toLowerCase()) lA.innerHTML += card;
                else if(j.equipo.toLowerCase() === currentMatch.equipo_b.toLowerCase()) lB.innerHTML += card;
            });
        }

        function toggleS(id) { document.getElementById(`s-${id}`).classList.toggle('open'); }
        
        async function up(jId, col, val, team) {
            await fetch(`${S_URL}/jugadores?id=eq.${jId}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ [col]: val }) });
            if(col === 'goles') {
                const f = team.toLowerCase() === currentMatch.equipo_a.toLowerCase() ? 'puntos_a' : 'puntos_b';
                currentMatch[f]++; // Incremento local para reflejar inmediato
                await fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ [f]: currentMatch[f] }) });
            }
            loadSheet();
        }

        async function loadHistory() {
            const res = await fetch(`${S_URL}/partidos?estado=eq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            document.getElementById('history-list').innerHTML = data.map(m => `
                <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid var(--stellar-gold)">
                    <b>${m.equipo_a} ${m.puntos_a} - ${m.puntos_b} ${m.equipo_b}</b>
                    <button onclick="reOpen(${m.id})" class="btn-ctrl" style="margin-top:10px; background:var(--primary); width:100%">CORREGIR</button>
                </div>
            `).join('');
        }

        async function reOpen(id) {
            if(!confirm("¿Abrir para corrección?")) return;
            // IMPORTANTE: Limpiar el cronómetro si había uno corriendo
            clearInterval(clockInt); isRunning = false;
            await fetch(`${S_URL}/partidos?id=eq.${id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ estado: 'en curso' }) });
            selectMatch(id);
        }

        async function finishMatch() {
            if(!confirm("¿Finalizar partido?")) return;
            await fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ estado: 'finalizado' }) });
            location.reload();
        }

        loadMatches();
    </script>
</body>
</html>
