<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Federation System</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* Navegación Inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: white; opacity: 0.5; font-size: 0.7rem; text-decoration: none; text-align: center; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--stellar-gold); }

        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        /* Estilos de Tarjetas de Partido */
        .match-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; }
        .match-card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--stellar-gold); }
        
        /* Scoreboard & Timers (Reutilizado y mejorado) */
        .game-clock { font-family: monospace; font-size: 2.5rem; text-align: center; color: var(--stellar-gold); margin: 10px 0; }
        .clock-warn { color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .btn-action { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-cancel { background: var(--danger); color: white; margin-top: 5px; width: 100%; display: none; }

        /* Planilla Columnas */
        .grid-players { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-item { background: var(--card); padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 0.8rem; border: 1px solid #475569; }
        
        /* Formularios */
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="view-tournament" class="view active">
        <h2 style="color:var(--stellar-gold)">TORNEO</h2>
        <div class="match-card">
            <h4>Nuevo Partido</h4>
            <input type="text" id="new-team-a" placeholder="Equipo Local (ej: Stelar)">
            <input type="text" id="new-team-b" placeholder="Equipo Visita (ej: Revolución)">
            <input type="text" id="new-cancha" placeholder="Cancha (ej: Cancha 1)">
            <button onclick="createMatch()" class="btn-action" style="background:var(--success); width:100%">CREAR Y PLANILLAR</button>
        </div>
        <div id="active-matches"></div>
    </div>

    <div id="view-sheet" class="view">
        <div class="match-card" style="text-align: center;">
            <div id="sheet-cancha" style="font-size: 0.7rem; opacity: 0.6;">CANCHA 1</div>
            <div id="main-timer" class="game-clock">00:00</div>
            <div style="display:flex; justify-content:space-around; font-size:2.5rem; font-weight:900;">
                <span id="scoreA">0</span> : <span id="scoreB">0</span>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button id="btn-to-a" class="btn-action" style="flex:1; background:#334155" onclick="runTO('A')">TO LOCAL</button>
                <button id="btn-half" class="btn-action" style="flex:0.6; background:#334155" onclick="runHalf()">MITAD</button>
                <button id="btn-to-b" class="btn-action" style="flex:1; background:#334155" onclick="runTO('B')">TO VISITA</button>
            </div>
            <button id="cancel-to" class="btn-action btn-cancel" onclick="stopTimers()">CANCELAR TIEMPO</button>
        </div>

        <div class="grid-players">
            <div id="sheet-listA"></div>
            <div id="sheet-listB"></div>
        </div>
        
        <div class="match-card" style="margin-top:20px;">
            <button onclick="finishMatch()" class="btn-action" style="background:var(--danger); width:100%">FINALIZAR PARTIDO</button>
        </div>
    </div>

    <div id="view-results" class="view">
        <h2 style="color:var(--stellar-gold)">HISTORIAL</h2>
        <div id="finished-matches"></div>
        <button onclick="exportData()" class="btn-action" style="background:var(--primary); width:100%; margin-top:10px;">EXPORTAR TODO (CSV)</button>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showView('tournament', this)">🏆 Torneo</div>
        <div class="nav-item" onclick="showView('sheet', this)">📋 Planilla</div>
        <div class="nav-item" onclick="showView('results', this)">📊 Resultados</div>
    </nav>

    <script>
        const S_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co/rest/v1';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const HEAD = { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let currentMatchID = 1;
        let timerInt = null;
        let runningTO = false;

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            el.classList.add('active');
            if(id === 'sheet') loadPlanilla();
            if(id === 'results') loadHistory();
        }

        // --- LÓGICA DE PARTIDOS ---
        async function createMatch() {
            const a = document.getElementById('new-team-a').value;
            const b = document.getElementById('new-team-b').value;
            const c = document.getElementById('new-cancha').value;
            
            const res = await fetch(`${S_URL}/partidos`, {
                method: 'POST',
                headers: HEAD,
                body: JSON.stringify({ equipo_a: a, equipo_b: b, cancha: c, estado: 'programado' })
            });
            const data = await res.json();
            currentMatchID = data[0].id;
            alert("Partido creado. Ve a la pestaña Planilla.");
        }

        // --- LÓGICA DE PLANILLA ---
        async function loadPlanilla() {
            const resP = await fetch(`${S_URL}/partidos?id=eq.${currentMatchID}`, { headers: HEAD });
            const p = (await resP.json())[0];
            document.getElementById('scoreA').innerText = p.puntos_a || 0;
            document.getElementById('scoreB').innerText = p.puntos_b || 0;
            document.getElementById('sheet-cancha').innerText = p.cancha;

            const resJ = await fetch(`${S_URL}/jugadores?select=*`, { headers: HEAD });
            const jugadores = await resJ.json();
            const listA = document.getElementById('sheet-listA');
            const listB = document.getElementById('sheet-listB');
            listA.innerHTML = ''; listB.innerHTML = '';

            jugadores.forEach(j => {
                const item = `<div class="player-item" onclick="addPoint(${j.id}, '${j.equipo}')">
                    #${j.numero} ${j.nombre.split(' ')[0]} <br>
                    <span style="font-size:0.6rem; opacity:0.5">G: ${j.goles||0} A: ${j.asistencias||0}</span>
                </div>`;
                if(j.equipo.toLowerCase() === p.equipo_a.toLowerCase()) listA.innerHTML += item;
                else if(j.equipo.toLowerCase() === p.equipo_b.toLowerCase()) listB.innerHTML += item;
            });
        }

        // --- CRONÓMETROS Y CANCELACIÓN ---
        function runTO(side) {
            if(runningTO) return;
            const btn = document.getElementById(side === 'A' ? 'btn-to-a' : 'btn-to-b');
            startCountdown(70, btn, "TO " + side);
        }

        function runHalf() {
            const btn = document.getElementById('btn-half');
            startCountdown(300, btn, "MITAD");
        }

        function startCountdown(sec, btn, originalText) {
            runningTO = true;
            document.getElementById('cancel-to').style.display = 'block';
            let t = sec;
            btn.style.background = 'var(--danger)';
            timerInt = setInterval(() => {
                btn.innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
                if(t-- <= 0) stopTimers();
            }, 1000);
        }

        function stopTimers() {
            clearInterval(timerInt);
            runningTO = false;
            document.getElementById('cancel-to').style.display = 'none';
            document.querySelectorAll('.btn-action').forEach(b => b.style.background = '#334155');
            document.getElementById('btn-to-a').innerText = "TO LOCAL";
            document.getElementById('btn-to-b').innerText = "TO VISITA";
            document.getElementById('btn-half').innerText = "MITAD";
        }

        // --- RESET Y CIERRE ---
        async function resetAll() {
            if(!confirm("¿Resetear estadísticas de jugadores a 0?")) return;
            await fetch(`${S_URL}/jugadores`, { 
                method: 'PATCH', 
                headers: HEAD, 
                body: JSON.stringify({ goles: 0, asistencias: 0, defensas: 0 }) 
            });
            loadPlanilla();
        }

        async function finishMatch() {
            if(!confirm("¿Finalizar y guardar partido?")) return;
            await fetch(`${S_URL}/partidos?id=eq.${currentMatchID}`, {
                method: 'PATCH',
                headers: HEAD,
                body: JSON.stringify({ estado: 'finalizado' })
            });
            showView('results', document.querySelectorAll('.nav-item')[2]);
        }

        loadPlanilla();
    </script>
</body>
</html>
