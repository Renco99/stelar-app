<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STELAR - Panel de Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; }
        .header { background: #1e293b; padding: 20px; border-bottom: 3px solid #3b82f6; }
        .scoreboard { display: flex; justify-content: center; gap: 40px; font-size: 3rem; margin: 20px 0; font-weight: bold; }
        .team-box { background: #334155; padding: 20px; border-radius: 15px; min-width: 150px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; padding: 20px; }
        button { padding: 15px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-score { background: #22c55e; color: white; }
        .btn-timeout { background: #f59e0b; color: white; }
        .btn-reset { background: #ef4444; color: white; margin-top: 20px; }
        #timer-display { font-size: 2rem; color: #60a5fa; margin: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>STELAR</h1>
    <div id="timer-display">00:00</div>
</div>

<div class="scoreboard">
    <div class="team-box">
        <div style="font-size: 1rem;">EQUIPO A</div>
        <div id="scoreA">0</div>
        <button class="btn-score" onclick="updateScore('A', 1)">+ PUNTO</button>
    </div>
    <div class="team-box">
        <div style="font-size: 1rem;">EQUIPO B</div>
        <div id="scoreB">0</div>
        <button class="btn-score" onclick="updateScore('B', 1)">+ PUNTO</button>
    </div>
</div>

<div class="controls">
    <button class="btn-timeout" onclick="startTimeout(60)">TIEMPO MUERTO (60s)</button>
    <button class="btn-timeout" onclick="startTimeout(600)">MEDIO TIEMPO (10m)</button>
</div>

<button class="btn-reset" onclick="resetGame()">REINICIAR PARTIDO</button>

<script>
    let scoreA = 0;
    let scoreB = 0;
    let timerInterval;
    const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co'; // Tu URL de API
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI'; // Tu API Key (anon public)
    const PARTIDO_ID = 1; // El ID del partido que creamos con SQL

    async function updateScore(team, points) {
        // 1. Actualizamos el marcador en la pantalla (lo que ya hacíamos)
        if(team === 'A') {
            scoreA += points;
            document.getElementById('scoreA').innerText = scoreA;
        } else {
            scoreB += points;
            document.getElementById('scoreB').innerText = scoreB;
        }

        // 2. ENVIAR A SUPABASE (El punto 3 que faltaba)
        const columna = team === 'A' ? 'puntos_a' : 'puntos_b';
        const nuevoPuntaje = team === 'A' ? scoreA : scoreB;

        try {
            await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                method: 'PATCH',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ [columna]: nuevoPuntaje })
            });
            console.log("Sincronizado con éxito");
        } catch (error) {
            console.error("Error al sincronizar:", error);
        }
    }
// Esta función revisa la base de datos cada 3 segundos
setInterval(async () => {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
        headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
        }
    });
    const data = await response.json();
    
    if (data.length > 0) {
        // Actualizamos los números en la pantalla automáticamente
        scoreA = data[0].puntos_a;
        scoreB = data[0].puntos_b;
        document.getElementById('scoreA').innerText = scoreA;
        document.getElementById('scoreB').innerText = scoreB;
    }
}, 3000);
</script>

</body>
</html>
