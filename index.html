<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELAR - High Performance</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #f59e0b; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        
        /* Header Estilo App */
        .header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--primary); margin: 0; }
        
        /* Marcador Principal */
        .live-match { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 30px 10px; margin-bottom: 20px; }
        .score-container { display: flex; justify-content: space-around; align-items: center; max-width: 600px; margin: 0 auto; }
        .team-name { font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 10px; }
        .score-number { font-size: 4rem; font-weight: 900; text-shadow: 0 0 15px var(--primary); }
        
        /* Botonera de Acción */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-goal { background: var(--primary); color: white; }
        .btn-assist { background: #10b981; color: white; }
        .btn-def { background: #8b5cf6; color: white; }
        .btn-timeout { background: var(--secondary); color: white; grid-column: span 2; }

        /* Pestañas Inferiores (Simulación) */
        .nav-tabs { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; }
        .nav-item { font-size: 0.7rem; opacity: 0.6; cursor: pointer; }
        .nav-item.active { color: var(--primary); opacity: 1; }
    </style>
</head>
