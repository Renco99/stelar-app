<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Tournament Admin</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        /* Estilos de Configuración */
        .config-section { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        .setup-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #475569; box-sizing: border-box; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .chip { background: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        
        /* Layout Planilla */
        .header-mini { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #000; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 50; }
        .score-mini { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 5px 15px; border-radius: 40px; border: 1px solid var(--primary); }
        .clock-mini { font-family: monospace; font-size: 1.8rem; font-weight: 800; color: var(--stellar-gold); }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: white; opacity: 0.5; font-size: 0.7rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { opacity: 1; color: var(--stellar-gold); font-weight: bold; }

        .view { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid-players { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .player-card { background: var(--card); border-radius: 10px; border: 1px solid #475569; margin-bottom: 6px; }
        .player-head { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .player-stats { display: none; padding: 8px; background: #000; border-top: 1px solid #334155; justify-content: space-around; gap: 4px; }
        .player-stats.open { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="header-planilla" class="header-mini" style="display:none">
        <div class="clock-mini" id="game-timer" onclick="handleClock()">00:00</div>
        <div class="score-mini">
            <div style="text-align:right"><b id="scoreA" style="font-size:1.5rem">0</b></div>
            <div style="font-size:0.6rem; opacity:0.5">VS</div>
            <div style="text-align:left"><b id="scoreB" style="font-size:1.5rem">0</b></div>
        </div>
        <button onclick="finishMatch()" style="background:var(--danger); border:none; color:white; padding:8px; border-radius:5px; font-size:0.6rem; font-weight:bold">FIN</button>
    </div>

    <div id="view-config" class="view active">
        <h2 style="color:var(--stellar-gold)">CONFIGURAR TORNEO</h2>
        
        <div class="config-section">
            <label>Nombre del Torneo</label>
            <input type="text" id="t-nombre" class="setup-input" placeholder="Ej: Nacional Ultimate 2026">
            <label>Canchas Disponibles</label>
            <input type="number" id="t-canchas" class="setup-input" value="1">
        </div>

        <div class="config-section">
            <h4 style="margin:0">Equipos</h4>
            <div style="display:flex; gap:5px">
                <input type="text" id="t-equipo-nom" class="setup-input" placeholder="Nombre del equipo">
                <button onclick="addEquipo()" class="btn-action" style="width:80px; background:var(--primary); color:white">+</button>
            </div>
            <div id="lista-equipos-chips" class="chip-container"></div>
        </div>

        <div class="config-section">
            <h4 style="margin:0">Crear Partido</h4>
            <select id="match-a" class="setup-input"><option>Equipo A</option></select>
            <select id="match-b" class="setup-input"><option>Equipo B</option></select>
            <div style="display:flex; gap:10px">
                <input type="text" id="match-cat" class="setup-input" placeholder="Categoría (Open/Mixed)">
                <input type="number" id="match-cancha" class="setup-input" placeholder="Cancha #">
            </div>
            <button onclick="saveMatch()" class="btn-action" style="background:var(--success); color:white">GENERAR PARTIDO</button>
        </div>
    </div>

    <div id="view-tournament" class="view">
        <h2 style="color:var(--stellar-gold)">PARTIDOS PROGRAMADOS</h2>
        <div id="match-list">Cargando...</div>
    </div>

    <div id="view-sheet" class="view">
        <div id="to-bar" style="display:flex; gap:5px; margin-bottom:10px"></div>
        <div class="grid-players">
            <div><div id="labelA" style="font-size:0.6rem; font-weight:900; color:var(--stellar-gold)">LOCAL</div><div id="listA"></div></div>
            <div><div id="labelB" style="font-size:0.6rem; font-weight:900; color:var(--stellar-gold)">VISITA</div><div id="listB"></div></div>
        </div>
    </div>

    <div id="view-results" class="view">
        <h2 style="color:var(--stellar-gold)">RESULTADOS</h2>
        <div id="history-list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showView('config')">⚙️ Config</div>
        <div class="nav-item" onclick="showView('tournament')">🏆 Partidos</div>
        <div class="nav-item" onclick="showView('sheet')">📋 Planilla</div>
        <div class="nav-item" onclick="showView('results')">📊 Resultados</div>
    </nav>

    <script>
        const S_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co/rest/v1';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const HEAD = { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let equipos = [];
        let currentMatch = null;

        function showView(v) {
            document.querySelectorAll('.view, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            if(v === 'sheet') document.getElementById('header-planilla').style.display = 'flex';
            else document.getElementById('header-planilla').style.display = 'none';
            
            if(v === 'tournament') loadMatches();
            if(v === 'results') loadHistory();
        }

        // --- GESTIÓN DE CONFIGURACIÓN ---
        function addEquipo() {
            const nom = document.getElementById('t-equipo-nom').value;
            if(!nom) return;
            equipos.push(nom);
            document.getElementById('t-equipo-nom').value = '';
            renderEquipos();
        }

        function renderEquipos() {
            const container = document.getElementById('lista-equipos-chips');
            const selectA = document.getElementById('match-a');
            const selectB = document.getElementById('match-b');
            
            container.innerHTML = equipos.map(e => `<span class="chip">${e}</span>`).join('');
            const options = equipos.map(e => `<option value="${e}">${e}</option>`).join('');
            selectA.innerHTML = options; selectB.innerHTML = options;
        }

        async function saveMatch() {
            const a = document.getElementById('match-a').value;
            const b = document.getElementById('match-b').value;
            const cat = document.getElementById('match-cat').value;
            const can = document.getElementById('match-cancha').value;
            
            if(a === b) return alert("No puede jugar un equipo contra sí mismo");
            
            await fetch(`${S_URL}/partidos`, {
                method: 'POST', headers: HEAD,
                body: JSON.stringify({ equipo_a: a, equipo_b: b, cancha: `Cancha ${can} - ${cat}`, estado: 'programado', puntos_a: 0, puntos_b: 0 })
            });
            alert("Partido creado");
            showView('tournament');
        }

        // --- FUNCIONES DE PLANILLA (Sincronizadas con versión anterior) ---
        async function loadMatches() {
            const res = await fetch(`${S_URL}/partidos?estado=neq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            document.getElementById('match-list').innerHTML = data.map(m => `
                <div onclick="selectMatch(${m.id})" style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #334155">
                    <div style="font-size:0.6rem; opacity:0.5">${m.cancha}</div>
                    <b>${m.equipo_a} vs ${m.equipo_b}</b>
                </div>
            `).join('');
        }

        async function selectMatch(id) {
            const res = await fetch(`${S_URL}/partidos?id=eq.${id}`, { headers: HEAD });
            currentMatch = (await res.json())[0];
            document.getElementById('scoreA').innerText = currentMatch.puntos_a;
            document.getElementById('scoreB').innerText = currentMatch.puntos_b;
            document.getElementById('labelA').innerText = currentMatch.equipo_a;
            document.getElementById('labelB').innerText = currentMatch.equipo_b;
            loadPlayers();
            showView('sheet');
        }

        async function loadPlayers() {
            const res = await fetch(`${S_URL}/jugadores?select=*&order=numero.asc`, { headers: HEAD });
            const data = await res.json();
            const lA = document.getElementById('listA'), lB = document.getElementById('listB');
            lA.innerHTML = ''; lB.innerHTML = '';
            data.forEach(j => {
                const card = `
                <div class="player-card">
                    <div class="player-head" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>#${j.numero} ${j.nombre.split(' ')[0]}</span>
                        <b style="color:var(--stellar-gold)">${j.goles||0}</b>
                    </div>
                    <div class="player-stats">
                        <button onclick="upStat(${j.id},'goles',${(j.goles||0)+1},'${j.equipo}')" style="background:var(--success); color:white; border:none; padding:5px; border-radius:4px; flex:1">GOL</button>
                        <button onclick="upStat(${j.id},'defensas',${(j.defensas||0)+1},'${j.equipo}')" style="background:var(--primary); color:white; border:none; padding:5px; border-radius:4px; flex:1">DEF</button>
                    </div>
                </div>`;
                if(j.equipo.toLowerCase() === currentMatch.equipo_a.toLowerCase()) lA.innerHTML += card;
                else if(j.equipo.toLowerCase() === currentMatch.equipo_b.toLowerCase()) lB.innerHTML += card;
            });
        }

        async function upStat(id, col, val, team) {
            await fetch(`${S_URL}/jugadores?id=eq.${id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ [col]: val }) });
            if(col === 'goles') {
                const field = team.toLowerCase() === currentMatch.equipo_a.toLowerCase() ? 'puntos_a' : 'puntos_b';
                currentMatch[field]++;
                await fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, { method: 'PATCH', headers: HEAD, body: JSON.stringify({ [field]: currentMatch[field] }) });
            }
            selectMatch(currentMatch.id);
        }

        async function loadHistory() {
            const res = await fetch(`${S_URL}/partidos?estado=eq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            document.getElementById('history-list').innerHTML = data.map(m => `
                <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid var(--stellar-gold)">
                    <b>${m.equipo_a} ${m.puntos_a} - ${m.puntos_b} ${m.equipo_b}</b>
                </div>
            `).join('');
        }

        loadMatches();
    </script>
</body>
</html>
