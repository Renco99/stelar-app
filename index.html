<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELAR - Control de Estadísticas</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #f59e0b; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        
        .header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--primary); margin: 0; }
        
        .live-match { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 20px 10px; text-align: center; }
        .score-container { display: flex; justify-content: space-around; align-items: center; max-width: 600px; margin: 0 auto; }
        .score-number { font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 10px var(--primary); }
        
        .stats-panel { background: var(--card); margin: 10px; border-radius: 15px; padding: 15px; }
        .player-card { background: #111827; margin-bottom: 10px; padding: 12px; border-radius: 10px; border-left: 4px solid var(--primary); }
        .player-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-group { display: flex; flex-direction: column; align-items: center; background: #1e293b; padding: 5px; border-radius: 8px; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; margin-bottom: 4px; opacity: 0.7; }
        .counter { display: flex; align-items: center; gap: 8px; }
        
        .btn-mini { width: 28px; height: 28px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-plus { background: var(--success); }
        .btn-minus { background: var(--danger); }
        .val { font-size: 1rem; font-weight: bold; min-width: 15px; text-align: center; }

        .nav-tabs { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<div class="header">
    <h2 class="logo">STELAR</h2>
    <div id="status">LIVE 🔴</div>
</div>

<div class="live-match">
    <div class="score-container">
        <div><div id="scoreA" class="score-number">0</div><small>LOCAL</small></div>
        <div style="opacity: 0.3;">VS</div>
        <div><div id="scoreB" class="score-number">0</div><small>VISITA</small></div>
    </div>
</div>

<div class="stats-panel">
    <h3>Planilla de Jugadores</h3>
    <div id="lista-jugadores">Cargando...</div>
</div>

<script>
    const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
    const PARTIDO_ID = 1;

    // Cargar jugadores y sus stats actuales
    async function cargarJugadores() {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*&order=numero.asc`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const jugadores = await res.json();
        const contenedor = document.getElementById('lista-jugadores');
        contenedor.innerHTML = '';

        jugadores.forEach(j => {
            const div = document.createElement('div');
            div.className = 'player-card';
            div.innerHTML = `
                <div class="player-info">
                    <span>#${j.numero} ${j.nombre}</span>
                    <small style="color:var(--primary)">${j.equipo}</small>
                </div>
                <div class="controls-grid">
                    <div class="stat-group">
                        <span class="stat-label">Goles</span>
                        <div class="counter">
                            <button class="btn-mini btn-minus" onclick="modificarStat(${j.id}, 'goles', ${j.goles - 1})">-</button>
                            <span class="val">${j.goles}</span>
                            <button class="btn-mini btn-plus" onclick="modificarStat(${j.id}, 'goles', ${j.goles + 1})">+</button>
                        </div>
                    </div>
                    <div class="stat-group">
                        <span class="stat-label">Asist</span>
                        <div class="counter">
                            <button class="btn-mini btn-minus" onclick="modificarStat(${j.id}, 'asistencias', ${j.asistencias - 1})">-</button>
                            <span class="val">${j.asistencias}</span>
                            <button class="btn-mini btn-plus" onclick="modificarStat(${j.id}, 'asistencias', ${j.asistencias + 1})">+</button>
                        </div>
                    </div>
                    <div class="stat-group">
                        <span class="stat-label">Defensas</span>
                        <div class="counter">
                            <button class="btn-mini btn-minus" onclick="modificarStat(${j.id}, 'defensas', ${j.defensas - 1})">-</button>
                            <span class="val">${j.defensas}</span>
                            <button class="btn-mini btn-plus" onclick="modificarStat(${j.id}, 'defensas', ${j.defensas + 1})">+</button>
                        </div>
                    </div>
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    // Función para subir el cambio a Supabase
    async function modificarStat(id, columna, nuevoValor) {
        if (nuevoValor < 0) return; // No permitir números negativos

        await fetch(`${SUPABASE_URL}/rest/v1/jugadores?id=eq.${id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ [columna]: nuevoValor })
        });
        
        cargarJugadores(); // Refrescar la lista visualmente
    }

    // Sincronizar marcador principal cada 3 seg
    setInterval(async () => {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        if (data.length > 0) {
            document.getElementById('scoreA').innerText = data[0].puntos_a;
            document.getElementById('scoreB').innerText = data[0].puntos_b;
        }
    }, 3000);

    cargarJugadores();
</script>

</body>
</html>
