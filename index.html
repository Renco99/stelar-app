<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDELINE - Tournament Admin</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --bg: #0f172a; 
            --card: #1e293b; 
            --danger: #ef4444; 
            --success: #39FF14; 
            --stellar-gold: #fbbf24; 
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding-bottom: 90px; 
        }

        /* CONSOLA DE ARBITRAJE */
        .control-panel { 
            background: #000; 
            padding: 15px; 
            border-bottom: 3px solid var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .score-row { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .game-clock { font-family: monospace; font-size: 2.5rem; font-weight: 800; color: white; }
        .team-name { font-size: 0.65rem; font-weight: 900; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .score-val { font-size: 3rem; font-weight: 900; line-height: 1; }
        
        .time-controls { display: flex; gap: 8px; margin-top: 12px; }
        .btn-t { 
            flex: 1; padding: 10px; border-radius: 8px; border: none; 
            font-size: 0.65rem; font-weight: bold; cursor: pointer; 
            color: white; text-transform: uppercase; background: #334155; 
        }

        /* VISTAS */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        
        /* LISTADO DE JUGADORES */
        .player-row {
            background: var(--card); 
            border: 1px solid #334155; 
            padding: 12px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            cursor: pointer;
