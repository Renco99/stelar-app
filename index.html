<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELLAR - Match Hub PRO</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --stellar-gold: #fbbf24; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; }
        
        /* Navegación */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { color: white; opacity: 0.5; font-size: 0.75rem; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { opacity: 1; color: var(--stellar-gold); font-weight: bold; }

        .view { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .view.active { display: block; }

        /* Tarjetas */
        .match-select-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; cursor: pointer; position: relative; }
        .score-board { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #334155; margin-bottom: 15px; }
        
        /* Botones */
        .btn-ctrl { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 0.75rem; color: white; cursor: pointer; }
        .btn-full { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .grid-players { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .player-card { background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid #475569; text-align: center; font-size: 0.85rem; }
        
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="view-tournament" class="view active">
        <h2 style="color:var(--stellar-gold)">HUB DE PARTIDOS</h2>
        <div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid var(--primary)">
            <input type="text" id="new-a" placeholder="Equipo Local">
            <input type="text" id="new-b" placeholder="Equipo Visita">
            <input type="text" id="new-c" placeholder="Cancha / Categoría">
            <button onclick="createMatch()" class="btn-full" style="background:var(--success); color:white;">REGISTRAR PARTIDO</button>
        </div>
        <div id="match-list">Cargando partidos...</div>
    </div>

    <div id="view-sheet" class="view">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px">
            <button onclick="showView('tournament')" class="btn-ctrl" style="background:#475569">← VOLVER</button>
            <button id="btn-toggle-clock" onclick="toggleClock()" class="btn-ctrl" style="background:var(--success)">INICIAR</button>
        </div>

        <div class="score-board">
            <div id="game-cancha" style="font-size:0.6rem; color:var(--stellar-gold); letter-spacing:1px; margin-bottom:5px">CANCHA</div>
            <div id="game-timer" style="font-family:monospace; font-size:3rem; font-weight:800">00:00</div>
            <div style="display:flex; justify-content:space-around; font-size:3.5rem; font-weight:900;">
                <span id="scoreA">0</span><span>:</span><span id="scoreB">0</span>
            </div>
        </div>

        <div class="grid-players">
            <div id="listA"></div>
            <div id="listB"></div>
        </div>

        <button onclick="finishMatch()" class="btn-full" style="background:var(--danger); color:white; margin-top:30px">FINALIZAR Y GUARDAR</button>
    </div>

    <div id="view-results" class="view">
        <h2 style="color:var(--stellar-gold)">HISTORIAL</h2>
        <div id="history-list">No hay partidos finalizados.</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showView('tournament')">🏆 Torneo</div>
        <div class="nav-item" id="nav-planilla" onclick="showView('sheet')">📋 Planilla</div>
        <div class="nav-item" onclick="showView('results')">📊 Resultados</div>
    </nav>

    <script>
        const S_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co/rest/v1';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const HEAD = { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let currentMatch = null;
        let timerInt = null;
        let seconds = 0;
        let isRunning = false;

        // --- NAVEGACIÓN CORREGIDA ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('active');
                if(n.innerText.toLowerCase().includes(viewId.replace('view-',''))) n.classList.add('active');
            });
            document.getElementById('view-' + viewId).classList.add('active');
            
            if(viewId === 'tournament') loadMatches();
            if(viewId === 'results') loadHistory();
        }

        // --- GESTIÓN DE PARTIDOS ---
        async function createMatch() {
            const a = document.getElementById('new-a').value;
            const b = document.getElementById('new-b').value;
            const c = document.getElementById('new-c').value;
            if(!a || !b) return alert("Indica ambos equipos");
            
            await fetch(`${S_URL}/partidos`, {
                method: 'POST', headers: HEAD,
                body: JSON.stringify({ equipo_a: a, equipo_b: b, cancha: c, estado: 'programado', puntos_a: 0, puntos_b: 0 })
            });
            loadMatches();
        }

        async function loadMatches() {
            const res = await fetch(`${S_URL}/partidos?estado=neq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            const list = document.getElementById('match-list');
            list.innerHTML = data.map(m => `
                <div class="match-select-card" onclick="selectMatch(${m.id})">
                    <div style="font-size:0.6rem; opacity:0.5">${m.cancha}</div>
                    <div style="font-weight:bold">${m.equipo_a} vs ${m.equipo_b}</div>
                    <div style="font-size:0.7rem; color:var(--stellar-gold)">${m.estado.toUpperCase()}</div>
                </div>
            `).join('');
        }

        async function selectMatch(id) {
            const res = await fetch(`${S_URL}/partidos?id=eq.${id}`, { headers: HEAD });
            currentMatch = (await res.json())[0];
            showView('sheet');
            document.getElementById('game-cancha').innerText = currentMatch.cancha.toUpperCase();
            loadSheet();
        }

        async function loadSheet() {
            if(!currentMatch) return;
            document.getElementById('scoreA').innerText = currentMatch.puntos_a;
            document.getElementById('scoreB').innerText = currentMatch.puntos_b;

            const resJ = await fetch(`${S_URL}/jugadores?select=*&order=numero.asc`, { headers: HEAD });
            const jugadores = await resJ.json();
            const lA = document.getElementById('listA'); const lB = document.getElementById('listB');
            lA.innerHTML = ''; lB.innerHTML = '';

            jugadores.forEach(j => {
                const card = `<div class="player-card" onclick="addPoint(${j.id}, '${j.equipo}')">
                    #${j.numero} ${j.nombre.split(' ')[0]} <br>
                    <b style="color:var(--stellar-gold)">${j.goles||0}</b>
                </div>`;
                if(j.equipo.toLowerCase() === currentMatch.equipo_a.toLowerCase()) lA.innerHTML += card;
                else if(j.equipo.toLowerCase() === currentMatch.equipo_b.toLowerCase()) lB.innerHTML += card;
            });
        }

        async function addPoint(jId, team) {
            if(!confirm("¿Registrar gol?")) return;
            const resJ = await fetch(`${S_URL}/jugadores?id=eq.${jId}`, { headers: HEAD });
            const jData = (await resJ.json())[0];
            await fetch(`${S_URL}/jugadores?id=eq.${jId}`, {
                method: 'PATCH', headers: HEAD,
                body: JSON.stringify({ goles: (jData.goles || 0) + 1 })
            });

            const field = team.toLowerCase() === currentMatch.equipo_a.toLowerCase() ? 'puntos_a' : 'puntos_b';
            currentMatch[field]++;
            await fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, {
                method: 'PATCH', headers: HEAD,
                body: JSON.stringify({ [field]: currentMatch[field] })
            });
            loadSheet();
        }

        // --- RELOJ ---
        function toggleClock() {
            const btn = document.getElementById('btn-toggle-clock');
            if(!isRunning) {
                isRunning = true;
                btn.innerText = "PAUSAR"; btn.style.background = "var(--danger)";
                timerInt = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds/60); const s = seconds%60;
                    document.getElementById('game-timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } else {
                isRunning = false;
                btn.innerText = "REANUDAR"; btn.style.background = "var(--success)";
                clearInterval(timerInt);
            }
        }

        // --- GUARDAR Y FINALIZAR ---
        async function finishMatch() {
            if(!currentMatch) return;
            if(!confirm("¿Deseas finalizar y guardar el resultado? El partido pasará al Historial.")) return;
            
            await fetch(`${S_URL}/partidos?id=eq.${currentMatch.id}`, {
                method: 'PATCH', headers: HEAD,
                body: JSON.stringify({ estado: 'finalizado' })
            });
            
            clearInterval(timerInt);
            isRunning = false;
            seconds = 0;
            document.getElementById('game-timer').innerText = "00:00";
            alert("Partido guardado con éxito.");
            showView('results');
        }

        async function loadHistory() {
            const res = await fetch(`${S_URL}/partidos?estado=eq.finalizado&order=id.desc`, { headers: HEAD });
            const data = await res.json();
            const list = document.getElementById('history-list');
            list.innerHTML = data.map(m => `
                <div class="match-select-card" style="border-left: 5px solid var(--stellar-gold)">
                    <div style="font-size:0.6rem; opacity:0.5">${m.cancha} | FINALIZADO</div>
                    <div style="font-weight:bold; display:flex; justify-content:space-between">
                        <span>${m.equipo_a} vs ${m.equipo_b}</span>
                        <span style="color:var(--stellar-gold)">${m.puntos_a} - ${m.puntos_b}</span>
                    </div>
                </div>
            `).join('') || "No hay partidos finalizados.";
        }

        loadMatches();
    </script>
</body>
</html>
