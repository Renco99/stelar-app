<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELAR - Control Panel</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* Marcador Principal */
        .score-board { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border-bottom: 4px solid var(--primary); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .score-display { display: flex; justify-content: space-around; align-items: center; font-size: 4rem; font-weight: 900; margin: 10px 0; }
        .vs { font-size: 1.2rem; opacity: 0.3; font-weight: 400; }
        
        /* Tarjetas de Jugadores */
        .player-card { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px; border-left: 6px solid var(--primary); }
        .player-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .player-name { font-size: 1.1rem; font-weight: 700; }
        .player-team { font-size: 0.8rem; color: var(--warning); font-weight: 600; text-transform: uppercase; }

        /* Grilla de Estadísticas */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { background: #111827; padding: 10px 5px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
        .counter { display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Botones Interactivos */
        .btn-stat { width: 34px; height: 34px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
        .btn-stat:active { transform: scale(0.9); }
        .plus { background: var(--success); }
        .minus { background: var(--danger); opacity: 0.8; }
        .stat-val { font-size: 1.4rem; font-weight: 800; min-width: 24px; }

        .section-title { font-size: 0.9rem; color: var(--primary); font-weight: 800; text-transform: uppercase; margin: 25px 0 15px 5px; letter-spacing: 1px; }
        
        /* Calendario Simple */
        .cal-item { background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem; border-left: 4px solid var(--warning); }
    </style>
</head>
<body>

    <div class="score-board">
        <div class="score-display">
            <div id="scoreA">0</div>
            <div class="vs">VS</div>
            <div id="scoreB">0</div>
        </div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="updateScore('A', 1)" style="background: var(--primary); border:none; color:white; padding:8px 15px; border-radius:8px; font-weight:bold;">+ LOCAL</button>
            <button onclick="updateScore('B', 1)" style="background: var(--warning); border:none; color:white; padding:8px 15px; border-radius:8px; font-weight:bold;">+ VISITA</button>
        </div>
    </div>

    <div class="section-title">🏃 Planilla de Estadísticas</div>
    <div id="lista-jugadores">Cargando jugadores...</div>

    <div class="section-title">📅 Calendario</div>
    <div id="lista-calendario"></div>

    <script>
        const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI';
        const PARTIDO_ID = 1;

        // CARGAR JUGADORES Y CALENDARIO
        async function fetchAll() {
            try {
                // Jugadores
                const rJ = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*&order=numero.asc`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const jugadores = await rJ.json();
                const contJ = document.getElementById('lista-jugadores');
                contJ.innerHTML = '';
                
                jugadores.forEach(j => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `
                        <div class="player-head">
                            <span class="player-name">#${j.numero || '0'} ${j.nombre}</span>
                            <span class="player-team">${j.equipo || ''}</span>
                        </div>
                        <div class="stats-grid">
                            ${renderControl(j.id, 'goles', j.goles, 'GOL')}
                            ${renderControl(j.id, 'asistencias', j.asistencias, 'AST')}
                            ${renderControl(j.id, 'defensas', j.defensas, 'DEF')}
                        </div>`;
                    contJ.appendChild(card);
                });

                // Calendario
                const rC = await fetch(`${SUPABASE_URL}/rest/v1/calendario?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const cal = await rC.json();
                const contC = document.getElementById('lista-calendario');
                contC.innerHTML = '';
                cal.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'cal-item';
                    item.innerHTML = `<strong>${c.equipo_a} vs ${c.equipo_b}</strong><br><small>${c.lugar || ''}</small>`;
                    contC.appendChild(item);
                });

            } catch (e) { console.error("Error cargando:", e); }
        }

        function renderControl(id, col, val, label) {
            const currentVal = val || 0;
            return `
                <div class="stat-box">
                    <span class="stat-label">${label}</span>
                    <div class="counter">
                        <button class="btn-stat minus" onclick="updateStat(${id}, '${col}', ${currentVal - 1})">-</button>
                        <span class="stat-val">${currentVal}</span>
                        <button class="btn-stat plus" onclick="updateStat(${id}, '${col}', ${currentVal + 1})">+</button>
                    </div>
                </div>`;
        }

        // ACTUALIZAR ESTADÍSTICA INDIVIDUAL
        async function updateStat(id, col, newVal) {
            if (newVal < 0) return;
            // Optimistic UI: Cambiamos el valor en pantalla antes de que responda el servidor para que se sienta rápido
            await fetch(`${SUPABASE_URL}/rest/v1/jugadores?id=eq.${id}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ [col]: newVal })
            });
            fetchAll();
        }

        // ACTUALIZAR MARCADOR GENERAL
        async function updateScore(team, points) {
            const col = team === 'A' ? 'puntos_a' : 'puntos_b';
            const res = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            const current = data[0][col] || 0;
            
            await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ [col]: current + points })
            });
        }

        // Sincronizar marcador cada 3 seg
        setInterval(async () => {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const d = await res.json();
            if (d.length > 0) {
                document.getElementById('scoreA').innerText = d[0].puntos_a || 0;
                document.getElementById('scoreB').innerText = d[0].puntos_b || 0;
            }
        }, 3000);

        fetchAll();
    </script>
</body>
</html>
