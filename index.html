<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STELAR - High Performance</title>
    <style>
        :root { --primary: #3b82f6; --secondary: #f59e0b; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        
        /* Header Estilo App */
        .header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 2px; color: var(--primary); margin: 0; }
        
        /* Marcador Principal */
        .live-match { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 30px 10px; margin-bottom: 20px; }
        .score-container { display: flex; justify-content: space-around; align-items: center; max-width: 600px; margin: 0 auto; }
        .team-name { font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 10px; }
        .score-number { font-size: 4rem; font-weight: 900; text-shadow: 0 0 15px var(--primary); }
        
        /* Botonera de Acción */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .btn { border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-goal { background: var(--primary); color: white; }
        .btn-assist { background: #10b981; color: white; }
        .btn-def { background: #8b5cf6; color: white; }
        .btn-timeout { background: var(--secondary); color: white; grid-column: span 2; }

        /* Pestañas Inferiores (Simulación) */
        .nav-tabs { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; }
        .nav-item { font-size: 0.7rem; opacity: 0.6; cursor: pointer; }
        .nav-item.active { color: var(--primary); opacity: 1; }
    </style>
</head>
<body>

<div class="stats-panel">
    <h3>Estadísticas de Jugadores 🏆</h3>
    <div id="lista-jugadores">
        <p style="opacity:0.5;">Cargando jugadores...</p>
    </div>
</div>

<div class="action-grid">
    <button class="btn btn-goal" onclick="updateScore('A', 1)">+ PUNTO LOCAL</button>
    <button class="btn btn-goal" onclick="updateScore('B', 1)">+ PUNTO VISITA</button>
    <button class="btn btn-assist" onclick="alert('Próximamente: Seleccionar jugador para ASISTENCIA')">ASISTENCIA</button>
    <button class="btn btn-def" onclick="alert('Próximamente: Registrar DEFENSA')">DEFENSA (D)</button>
    <button class="btn btn-timeout" onclick="startTimeout(60)">TIEMPO MUERTO</button>
</div>

<nav class="nav-tabs">
    <div class="nav-item active">EN VIVO</div>
    <div class="nav-item" onclick="alert('Cargando Calendario...')">CALENDARIO</div>
    <div class="nav-item" onclick="alert('Buscando Estadísticas...')">STATS</div>
</nav>

<script>
    // 1. CONFIGURACIÓN (REEMPLAZA ESTO)
    const SUPABASE_URL = 'https://bzgsplkbmygagsmmcqql.supabase.co'; // Tu URL real
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Z3NwbGtibXlnYWdzbW1jcXFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDE2ODEsImV4cCI6MjA5MDgxNzY4MX0.qfbA2U9RX3Yl7En_GcgEaronUuMHKuJ81PcL550UPzI'; // Tu Key real (la larga)
    const PARTIDO_ID = 1;

    let scoreA = 0;
    let scoreB = 0;

    // 2. FUNCIÓN PARA MARCADOR
    async function updateScore(team, points) {
        if(team === 'A') scoreA += points;
        else scoreB += points;
        
        document.getElementById('scoreA').innerText = scoreA;
        document.getElementById('scoreB').innerText = scoreB;

        const columna = team === 'A' ? 'puntos_a' : 'puntos_b';
        const nuevoPuntaje = team === 'A' ? scoreA : scoreB;

        await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ [columna]: nuevoPuntaje })
        });
    }

    // 3. FUNCIÓN PARA CARGAR JUGADORES
    async function cargarJugadores() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/jugadores?select=*`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const jugadores = await res.json();
            const contenedor = document.getElementById('lista-jugadores');
            if(!contenedor) return;
            
            contenedor.innerHTML = '';
            jugadores.forEach(j => {
                const div = document.createElement('div');
                div.className = 'player-row';
                div.innerHTML = `
                    <span><strong>#${j.numero}</strong> ${j.nombre}</span>
                    <div>
                        <button class="btn btn-small btn-goal" onclick="registrarAccion(${j.id}, 'goles', '${j.equipo}')">G</button>
                        <button class="btn btn-small btn-assist" onclick="registrarAccion(${j.id}, 'asistencias')">A</button>
                        <button class="btn btn-small btn-def" onclick="registrarAccion(${j.id}, 'defensas')">D</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        } catch (e) { console.error("Error:", e); }
    }

    // 4. FUNCIÓN PARA REGISTRAR ACCIONES
    async function registrarAccion(id, columna, equipo) {
        console.log("Registrando:", columna, "para ID:", id);
        // Aquí podrías añadir la lógica de actualización en Supabase
        alert("Acción registrada en consola. ¡Pronto impactará en la BD!");
    }

    // 5. INICIALIZACIÓN Y LECTURA AUTOMÁTICA
    cargarJugadores();

    setInterval(async () => {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/partidos?id=eq.${PARTIDO_ID}`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            if (data.length > 0) {
                scoreA = data[0].puntos_a;
                scoreB = data[0].puntos_b;
                if(document.getElementById('scoreA')) document.getElementById('scoreA').innerText = scoreA;
                if(document.getElementById('scoreB')) document.getElementById('scoreB').innerText = scoreB;
            }
        } catch (e) { console.log("Error sync:", e); }
    }, 3000);

</script>
</body>
</html>
